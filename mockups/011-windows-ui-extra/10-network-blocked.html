<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Hermes 启动器 · 网络无法访问</title>
<style>
  :root {
    --bg-app: #F2F0E8;
    --bg-app-secondary: #EBE8E0;
    --bg-glow: #F4C98A;
    --surface-primary: #FAF8F2;
    --surface-secondary: #F4F0E8;
    --surface-tertiary: #F0E8DE;
    --surface-hover: #F2E6D6;
    --text-primary: #262621;
    --text-secondary: #5E594F;
    --text-tertiary: #897F75;
    --text-on-accent: #FCFCF7;
    --accent-primary: #D9772B;
    --accent-soft: #F2B56B;
    --accent-deep: #A85420;
    --success: #4F8F7A;
    --success-soft: #DBEDE5;
    --warning: #C78A3A;
    --warning-soft: #F4E8D2;
    --danger: #C25E52;
    --danger-soft: #F7E0D8;
    --line-soft: rgba(0, 0, 0, 0.06);
    --line-softer: rgba(0, 0, 0, 0.04);
    --shadow-window: 0 24px 64px rgba(60, 40, 20, 0.18), 0 4px 12px rgba(60, 40, 20, 0.08);
    --shadow-card: 0 6px 18px rgba(60, 40, 20, 0.06);
    --shadow-button: 0 8px 20px rgba(217, 119, 43, 0.28), 0 2px 4px rgba(168, 84, 32, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: ui-rounded, 'SF Pro Rounded', -apple-system, BlinkMacSystemFont,
                 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    color: var(--text-primary);
    background: radial-gradient(1200px 800px at 50% 30%, #EFEAE0 0%, #DCD5C7 60%, #C9C0B0 100%);
    overflow: hidden;
  }

  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 32px; }
  .frame-holder { --w: 920; --h: 560; --s: 1;
    width: calc(var(--w) * 1px * var(--s));
    height: calc(var(--h) * 1px * var(--s));
    position: relative;
  }
  .window {
    width: calc(var(--w) * 1px); height: calc(var(--h) * 1px);
    transform: scale(var(--s)); transform-origin: top left;
    border-radius: 12px; background: var(--bg-app);
    box-shadow: var(--shadow-window); overflow: hidden;
    display: flex; flex-direction: column; border: 1px solid var(--line-soft);
  }

  /* 标题栏 */
  .title-bar {
    height: 36px; background: var(--surface-primary);
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 0 12px; user-select: none; flex-shrink: 0;
  }
  .title-left { display: flex; align-items: center; gap: 10px; }
  .app-icon {
    width: 18px; height: 18px; border-radius: 5px;
    background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent-primary) 60%, var(--accent-deep) 100%);
    box-shadow: 0 1px 2px rgba(168, 84, 32, 0.3); position: relative;
  }
  .app-icon::after {
    content: ''; position: absolute; inset: 4px; border-radius: 2px;
    border: 1.5px solid rgba(255, 255, 255, 0.65);
    border-bottom-color: transparent; border-right-color: transparent;
  }
  .title-text { font-size: 12px; color: var(--text-secondary); }
  .window-controls { display: flex; }
  .window-controls button {
    width: 46px; height: 36px; background: transparent; border: 0;
    color: var(--text-tertiary); cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .window-controls button:hover { background: var(--surface-secondary); }
  .window-controls .close:hover { background: var(--danger); color: #fff; }
  .window-controls svg { width: 10px; height: 10px; }

  /* Body */
  .body {
    flex: 1;
    background:
      radial-gradient(720px 520px at 50% 78%, rgba(244, 201, 138, 0.22) 0%, rgba(244, 201, 138, 0) 60%),
      radial-gradient(420px 360px at 18% 22%, rgba(244, 201, 138, 0.16) 0%, rgba(244, 201, 138, 0) 60%),
      var(--bg-app);
    padding: 22px 36px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
  .brand-title { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.15; }
  .brand-subtitle { font-size: 12.5px; color: var(--text-tertiary); margin-top: 4px; }
  .btn-about {
    height: 36px; padding: 0 16px; border-radius: 10px;
    background: transparent; border: 1.5px solid rgba(168, 84, 32, 0.32);
    color: var(--accent-deep); font-size: 13.5px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.16s ease;
  }
  .btn-about:hover { background: rgba(217, 119, 43, 0.06); border-color: var(--accent-primary); }

  /* 中央卡片 */
  .center-card {
    flex: 1;
    background: var(--surface-primary);
    border: 1px solid var(--line-softer);
    border-radius: 18px;
    padding: 28px 36px 28px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .center-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(420px 320px at 100% 100%, rgba(244, 201, 138, 0.20) 0%, rgba(244, 201, 138, 0) 60%);
    pointer-events: none;
  }
  .center-card > * { position: relative; z-index: 1; }

  /* Hero icon — 暖橙圆 + 中性感叹号 */
  .status-icon {
    width: 66px;
    height: 66px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 35%, #FFE7C4 0%, #F5C285 55%, #E59B4E 100%);
    box-shadow:
      0 12px 28px rgba(217, 119, 43, 0.22),
      0 2px 6px rgba(168, 84, 32, 0.16),
      inset 0 1px 1px rgba(255, 255, 255, 0.55);
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    animation: icon-breath 4s ease-in-out infinite;
  }
  @keyframes icon-breath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.025); }
  }
  .status-icon svg {
    width: 30px; height: 30px;
    color: var(--text-on-accent);
    filter: drop-shadow(0 1px 1px rgba(168, 84, 32, 0.3));
  }

  /* Tag */
  .status-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(217, 119, 43, 0.14);
    color: var(--accent-deep);
    font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.06em;
  }

  .status-headline {
    font-size: 26px; font-weight: 700; letter-spacing: -0.012em; line-height: 1.2;
    color: var(--text-primary);
    max-width: 600px;
  }

  .status-subline {
    font-size: 13.5px; line-height: 1.65; color: var(--text-secondary);
    max-width: 520px;
    letter-spacing: 0.005em;
  }

  /* 检测结果列表 */
  .probe-list {
    background: var(--surface-secondary);
    border: 1px solid var(--line-softer);
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 6px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .probe-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--text-secondary);
  }
  .probe-name {
    color: var(--text-primary);
    font-weight: 500;
  }
  .probe-status {
    color: var(--text-tertiary);
    font-size: 11.5px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-variant-numeric: tabular-nums;
  }
  .probe-status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    opacity: 0.5;
  }

  /* 按钮组 */
  .button-row {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }

  .btn {
    height: 46px;
    padding: 0 26px;
    border-radius: 12px;
    font-size: 14.5px;
    font-weight: 600;
    font-family: inherit;
    border: 0;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(180deg, #E58236, var(--accent-primary) 60%, #C76819);
    color: var(--text-on-accent);
    box-shadow: var(--shadow-button);
    min-width: 148px;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 26px rgba(217, 119, 43, 0.36), 0 2px 4px rgba(168, 84, 32, 0.22);
  }
  .btn-primary svg { width: 14px; height: 14px; }

  .btn-secondary {
    background: transparent;
    color: var(--accent-deep);
    border: 1.5px solid var(--accent-deep);
    min-width: 124px;
  }
  .btn-secondary:hover {
    background: rgba(217, 119, 43, 0.06);
    border-color: var(--accent-primary);
  }

  /* 底部 hint */
  .helper-hint {
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
  }

  .mockup-tag {
    position: fixed; top: 12px; left: 12px;
    background: rgba(38, 38, 33, 0.78); color: var(--text-on-accent);
    padding: 6px 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.06em; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .mockup-note {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(38, 38, 33, 0.78); color: var(--text-on-accent);
    padding: 6px 14px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.04em; z-index: 100;
    backdrop-filter: blur(8px);
  }

  /* ============== Mobile auto-fit ============== */
  @media (max-width: 960px) {
    html, body {
      height: auto !important;
      overflow: visible !important;
      overflow-x: hidden !important;
      min-height: 100vh;
    }
    .stage {
      position: static !important;
      padding: 0 !important;
      display: block !important;
      height: auto !important;
    }
    .frame-holder {
      width: 100vw !important;
      height: calc(560 / 920 * 100vw) !important;
    }
    .window {
      width: 920px !important;
      height: 560px !important;
      transform: scale(calc(100vw / 920)) !important;
      transform-origin: top left !important;
      border-radius: 0 !important;
    }
    .mockup-note {
      position: static !important;
      transform: none !important;
      display: block !important;
      width: fit-content;
      margin: 8px auto 16px !important;
    }
  }
</style>
</head>
<body>

  <span class="mockup-tag">Mockup 10 · 网络无法访问 · preflight blocking 子状态</span>
  <span class="mockup-note">↑ 暖橙感叹号 · 列出尝试过的源 · 不引导 VPN/加群,只让用户重试或退出</span>

  <div class="stage">
    <div class="frame-holder" id="holder">
      <div class="window">

        <div class="title-bar">
          <div class="title-left">
            <div class="app-icon"></div>
            <span class="title-text">Hermes Agent 桌面控制台</span>
          </div>
          <div class="window-controls">
            <button title="最小化"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="5" x2="10" y2="5"/></svg></button>
            <button title="最大化"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg></button>
            <button class="close" title="关闭"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="0" x2="10" y2="10"/><line x1="10" y1="0" x2="0" y2="10"/></svg></button>
          </div>
        </div>

        <div class="body">

          <div class="header">
            <div>
              <h1 class="brand-title">Hermes Agent</h1>
              <span class="brand-subtitle">更聪明的个人 AI 助理 · Windows v2026.05.04.20</span>
            </div>
            <button class="btn-about">关于</button>
          </div>

          <!-- 中央卡片 -->
          <div class="center-card">

            <!-- Hero icon — 暖橙圆 + 感叹号(中性,不用红色避免焦虑) -->
            <div class="status-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="6" x2="12" y2="13"/>
                <circle cx="12" cy="17.5" r="1" fill="currentColor"/>
              </svg>
            </div>

            <span class="status-tag">网络无法访问</span>

            <h2 class="status-headline">暂时无法访问安装资源</h2>

            <p class="status-subline">
              我们尝试连接了 GitHub 与所有国内镜像源,目前都没能连上。<br>
              这通常是临时网络问题,稍后再试就行。
            </p>

            <!-- 检测结果列表 -->
            <div class="probe-list">
              <div class="probe-item">
                <span class="probe-name">官方源 · github.com</span>
                <span class="probe-status">未连接</span>
              </div>
              <div class="probe-item">
                <span class="probe-name">自建镜像 · hermes.aisuper.win</span>
                <span class="probe-status">未连接</span>
              </div>
              <div class="probe-item">
                <span class="probe-name">5 个社区镜像</span>
                <span class="probe-status">全部未连接</span>
              </div>
            </div>

            <!-- 按钮组 -->
            <div class="button-row">
              <button class="btn btn-primary">
                重新检测
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 7 a5 5 0 1 1 1.5 3.5"/>
                  <polyline points="2 11 2 7 6 7"/>
                </svg>
              </button>
              <button class="btn btn-secondary">暂不安装</button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const holder = document.getElementById('holder');
      const W = 920, H = 560;
      function scale() {
        const padding = 32;
        const availW = window.innerWidth - padding * 2;
        const availH = window.innerHeight - padding * 2;
        const s = Math.min(availW / W, availH / H, 1);
        holder.style.setProperty('--s', s);
      }
      scale();
      window.addEventListener('resize', scale);
      window.addEventListener('orientationchange', scale);
    })();
  </script>
</body>
</html>
