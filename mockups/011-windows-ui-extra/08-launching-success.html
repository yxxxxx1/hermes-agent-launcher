<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Hermes 启动器 · WebUI 启动成功</title>
<style>
  :root {
    --bg-app: #F2F0E8;
    --bg-app-secondary: #EBE8E0;
    --bg-glow: #F4C98A;
    --surface-primary: #FAF8F2;
    --surface-secondary: #F4F0E8;
    --surface-tertiary: #F0E8DE;
    --surface-hover: #F2E6D6;
    --text-primary: #262621;
    --text-secondary: #5E594F;
    --text-tertiary: #897F75;
    --text-on-accent: #FCFCF7;
    --accent-primary: #D9772B;
    --accent-soft: #F2B56B;
    --accent-deep: #A85420;
    --success: #4F8F7A;
    --success-soft: #DBEDE5;
    --success-glow: #C7E5DA;
    --warning: #C78A3A;
    --warning-soft: #F4E8D2;
    --danger: #C25E52;
    --danger-soft: #F7E0D8;
    --line-soft: rgba(0, 0, 0, 0.06);
    --line-softer: rgba(0, 0, 0, 0.04);
    --shadow-window: 0 24px 64px rgba(60, 40, 20, 0.18), 0 4px 12px rgba(60, 40, 20, 0.08);
    --shadow-card: 0 6px 18px rgba(60, 40, 20, 0.06);
    --shadow-button: 0 8px 20px rgba(217, 119, 43, 0.28), 0 2px 4px rgba(168, 84, 32, 0.18);
    --shadow-success: 0 12px 32px rgba(79, 143, 122, 0.22), 0 2px 6px rgba(54, 109, 92, 0.14), inset 0 1px 1px rgba(255, 255, 255, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: ui-rounded, 'SF Pro Rounded', -apple-system, BlinkMacSystemFont,
                 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    color: var(--text-primary);
    background: radial-gradient(1200px 800px at 50% 30%, #EFEAE0 0%, #DCD5C7 60%, #C9C0B0 100%);
    overflow: hidden;
  }

  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 32px; }
  .frame-holder { --w: 920; --h: 560; --s: 1;
    width: calc(var(--w) * 1px * var(--s));
    height: calc(var(--h) * 1px * var(--s));
    position: relative;
  }
  .window {
    width: calc(var(--w) * 1px); height: calc(var(--h) * 1px);
    transform: scale(var(--s)); transform-origin: top left;
    border-radius: 12px; background: var(--bg-app);
    box-shadow: var(--shadow-window); overflow: hidden;
    display: flex; flex-direction: column; border: 1px solid var(--line-soft);
  }

  /* 标题栏 */
  .title-bar {
    height: 36px; background: var(--surface-primary);
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 0 12px; user-select: none; flex-shrink: 0;
  }
  .title-left { display: flex; align-items: center; gap: 10px; }
  .app-icon {
    width: 18px; height: 18px; border-radius: 5px;
    background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent-primary) 60%, var(--accent-deep) 100%);
    box-shadow: 0 1px 2px rgba(168, 84, 32, 0.3); position: relative;
  }
  .app-icon::after {
    content: ''; position: absolute; inset: 4px; border-radius: 2px;
    border: 1.5px solid rgba(255, 255, 255, 0.65);
    border-bottom-color: transparent; border-right-color: transparent;
  }
  .title-text { font-size: 12px; color: var(--text-secondary); }
  .window-controls { display: flex; }
  .window-controls button {
    width: 46px; height: 36px; background: transparent; border: 0;
    color: var(--text-tertiary); cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .window-controls button:hover { background: var(--surface-secondary); }
  .window-controls .close:hover { background: var(--danger); color: #fff; }
  .window-controls svg { width: 10px; height: 10px; }

  /* Body */
  .body {
    flex: 1;
    background:
      radial-gradient(720px 520px at 50% 78%, rgba(199, 229, 218, 0.40) 0%, rgba(199, 229, 218, 0) 60%),
      radial-gradient(420px 360px at 18% 22%, rgba(244, 201, 138, 0.16) 0%, rgba(244, 201, 138, 0) 60%),
      var(--bg-app);
    padding: 24px 36px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
  .brand-title { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.15; }
  .brand-subtitle { font-size: 12.5px; color: var(--text-tertiary); margin-top: 4px; }
  .btn-about {
    height: 36px; padding: 0 16px; border-radius: 10px;
    background: transparent; border: 1.5px solid rgba(168, 84, 32, 0.32);
    color: var(--accent-deep); font-size: 13.5px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.16s ease;
  }
  .btn-about:hover { background: rgba(217, 119, 43, 0.06); border-color: var(--accent-primary); }

  /* ====== 启动卡(成功态) ====== */
  .launch-card {
    flex: 1;
    background: var(--surface-primary);
    border: 1px solid var(--line-softer);
    border-radius: 18px;
    padding: 28px 32px 24px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .launch-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(420px 320px at 100% 100%, rgba(199, 229, 218, 0.32) 0%, rgba(199, 229, 218, 0) 60%);
    pointer-events: none;
  }
  .launch-card > * { position: relative; z-index: 1; }

  /* 顶部 hero 行 */
  .launch-head {
    display: flex; align-items: center; gap: 18px;
  }

  /* Success badge — 墨绿圆 + 白色 ✓(替代 07 的 spinner) */
  .success-badge {
    flex-shrink: 0;
    position: relative;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #B8DDCC 0%, #6FA995 55%, #3F7A65 100%);
    box-shadow: var(--shadow-success);
    display: flex; align-items: center; justify-content: center;
    animation: success-breath 3.6s ease-in-out infinite;
  }
  @keyframes success-breath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .success-badge svg {
    width: 28px; height: 28px;
    color: var(--text-on-accent);
    filter: drop-shadow(0 1px 1px rgba(40, 80, 65, 0.3));
    animation: check-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s both;
  }
  @keyframes check-pop {
    0%   { opacity: 0; transform: scale(0.4) rotate(-12deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  .launch-text {
    flex: 1;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* Eyebrow — 墨绿静止(替代 07 的暖橙闪烁) */
  .launch-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 700;
    color: var(--success); letter-spacing: 0.08em; text-transform: uppercase;
    width: fit-content;
  }
  .launch-eyebrow::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--success);
    /* 不闪烁 — 静止表示已完成 */
  }

  .launch-headline {
    font-size: 26px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.2;
    color: var(--text-primary);
  }

  .launch-subline {
    font-size: 13.5px; line-height: 1.55; color: var(--text-secondary);
  }
  .launch-subline a {
    color: var(--accent-deep); font-weight: 600; text-decoration: none;
    border-bottom: 1px dashed rgba(168, 84, 32, 0.4); padding-bottom: 1px;
  }
  .launch-subline a:hover { border-bottom-style: solid; }

  /* URL bar(替代 07 的 current-stage) */
  .url-bar {
    background: var(--surface-secondary);
    border: 1px solid var(--line-softer);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px;
  }
  .url-bar-icon {
    width: 18px; height: 18px; flex-shrink: 0;
    color: var(--success);
    display: flex; align-items: center; justify-content: center;
  }
  .url-bar-text {
    color: var(--text-primary); font-weight: 500;
    font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 12.5px; letter-spacing: 0.01em;
    flex: 1;
  }

  /* 进度条 — 100% 墨绿不 shine */
  .progress-track {
    height: 6px;
    background: var(--surface-tertiary);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #3F7A65 0%, var(--success) 60%, #6FA995 100%);
    box-shadow: 0 0 8px rgba(79, 143, 122, 0.28);
    position: relative;
  }

  /* 7 步迷你步骤 — 全部 done */
  .mini-steps {
    display: flex; gap: 6px; align-items: center;
  }
  .mini-step {
    flex: 1;
    height: 28px;
    background: var(--surface-secondary);
    border: 1px solid var(--line-softer);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10.5px; font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
    transition: all 0.18s ease;
    position: relative;
  }
  .mini-step.done {
    background: var(--success-soft);
    color: var(--success);
    border-color: rgba(79, 143, 122, 0.3);
  }
  .mini-step .check {
    width: 10px; height: 10px; margin-right: 3px;
  }

  /* 按钮组 */
  .launch-buttons {
    display: flex; gap: 12px; align-items: center;
    margin-top: auto;
    padding-top: 4px;
  }

  .btn {
    height: 46px; padding: 0 24px; border-radius: 12px;
    font-size: 14.5px; font-weight: 600; font-family: inherit;
    border: 0; cursor: pointer; transition: all 0.18s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(180deg, #E58236, var(--accent-primary) 60%, #C76819);
    color: var(--text-on-accent);
    box-shadow: var(--shadow-button);
    min-width: 168px;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 26px rgba(217, 119, 43, 0.36), 0 2px 4px rgba(168, 84, 32, 0.22);
  }
  .btn-primary svg { width: 14px; height: 14px; }

  .btn-secondary {
    background: transparent; color: var(--accent-deep);
    border: 1.5px solid var(--accent-deep);
    height: 46px; padding: 0 22px;
    border-radius: 12px; font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.18s ease;
    min-width: 124px;
  }
  .btn-secondary:hover { background: rgba(217, 119, 43, 0.06); border-color: var(--accent-primary); }

  .countdown {
    margin-left: auto;
    font-size: 12px; color: var(--text-tertiary);
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 6px;
  }
  .countdown svg { width: 12px; height: 12px; }
  .countdown strong { color: var(--text-secondary); font-weight: 600; }

  .mockup-tag {
    position: fixed; top: 12px; left: 12px;
    background: rgba(38, 38, 33, 0.78); color: var(--text-on-accent);
    padding: 6px 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.06em; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .mockup-note {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(38, 38, 33, 0.78); color: var(--text-on-accent);
    padding: 6px 14px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.04em; z-index: 100;
    backdrop-filter: blur(8px);
  }

  /* ============== Mobile auto-fit ============== */
  @media (max-width: 960px) {
    html, body {
      height: auto !important;
      overflow: visible !important;
      overflow-x: hidden !important;
      min-height: 100vh;
    }
    .stage {
      position: static !important;
      padding: 0 !important;
      display: block !important;
      height: auto !important;
    }
    .frame-holder {
      width: 100vw !important;
      height: calc(560 / 920 * 100vw) !important;
    }
    .window {
      width: 920px !important;
      height: 560px !important;
      transform: scale(calc(100vw / 920)) !important;
      transform-origin: top left !important;
      border-radius: 0 !important;
    }
    .mockup-note {
      position: static !important;
      transform: none !important;
      display: block !important;
      width: fit-content;
      margin: 8px auto 16px !important;
    }
  }
</style>
</head>
<body>

  <span class="mockup-tag">Mockup 8 · WebUI 启动成功 · 修复任务 014 Bug C</span>
  <span class="mockup-note">↑ 7 段全绿 ✓ + URL 可复制 + 800ms 后 launcher 自动收回主页(01 已就绪)</span>

  <div class="stage">
    <div class="frame-holder" id="holder">
      <div class="window">

        <div class="title-bar">
          <div class="title-left">
            <div class="app-icon"></div>
            <span class="title-text">Hermes 启动器</span>
          </div>
          <div class="window-controls">
            <button title="最小化"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="5" x2="10" y2="5"/></svg></button>
            <button title="最大化"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg></button>
            <button class="close" title="关闭"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><line x1="0" y1="0" x2="10" y2="10"/><line x1="10" y1="0" x2="0" y2="10"/></svg></button>
          </div>
        </div>

        <div class="body">

          <div class="header">
            <div>
              <h1 class="brand-title">Hermes Agent</h1>
              <span class="brand-subtitle">为中文用户准备的图形启动器 · v2026.05.04.6</span>
            </div>
            <button class="btn-about">关于</button>
          </div>

          <!-- 启动卡(成功态) -->
          <div class="launch-card">

            <div class="launch-head">
              <!-- Success badge — 墨绿圆 + 白勾,替代 07 的 spinner -->
              <div class="success-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="5 12.5 10 17.5 19 7.5"/>
                </svg>
              </div>
              <div class="launch-text">
                <span class="launch-eyebrow">WebUI 已启动</span>
                <h2 class="launch-headline">已在浏览器中打开</h2>
                <p class="launch-subline">几秒后自动收起此窗口 · 浏览器没自动打开?<a href="#">手动打开 ↗</a></p>
              </div>
            </div>

            <!-- URL bar(替代 07 的 current-stage) -->
            <div class="url-bar">
              <span class="url-bar-icon">
                <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="9" cy="9" r="7.5"/>
                  <polyline points="5.5 9.2 8 11.7 12.7 6.6"/>
                </svg>
              </span>
              <span class="url-bar-text">http://127.0.0.1:8648</span>
            </div>

            <!-- 进度条 — 100% 墨绿满 -->
            <div class="progress-track">
              <div class="progress-fill"></div>
            </div>

            <!-- 7 步迷你阶段 — 全部 done -->
            <div class="mini-steps">
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                环境
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                下载 Node
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                解压
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                装 WebUI
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                启 Gateway
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                等待就绪
              </div>
              <div class="mini-step done">
                <svg class="check" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 4 7 8 3"/></svg>
                启 WebUI
              </div>
            </div>

            <!-- 按钮组 -->
            <div class="launch-buttons">
              <button class="btn btn-primary">
                打开浏览器
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="2" y1="7" x2="11" y2="7"/>
                  <polyline points="7 3 11 7 7 11"/>
                </svg>
              </button>
              <button class="btn-secondary">关闭窗口</button>

              <span class="countdown">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="6" cy="6" r="4.5"/>
                  <polyline points="6 3.5 6 6 8 7"/>
                </svg>
                <strong>2 秒</strong>后自动收起
              </span>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const holder = document.getElementById('holder');
      const W = 920, H = 560;
      function scale() {
        const padding = 32;
        const availW = window.innerWidth - padding * 2;
        const availH = window.innerHeight - padding * 2;
        const s = Math.min(availW / W, availH / H, 1);
        holder.style.setProperty('--s', s);
      }
      scale();
      window.addEventListener('resize', scale);
      window.addEventListener('orientationchange', scale);
    })();
  </script>
</body>
</html>
